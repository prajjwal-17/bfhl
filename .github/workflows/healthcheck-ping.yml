name: Keep Backend Warm

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-enable this workflow to prevent GitHub from disabling it
        run: |
          curl --silent --fail --show-error \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/healthcheck-ping.yml/enable"

      - name: Ping deployed health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "BACKEND_HEALTHCHECK_URL is not configured."
            exit 1
          fi

          echo "Pinging $HEALTHCHECK_URL"
          curl --fail --silent --show-error --max-time 20 "$HEALTHCHECK_URL"
